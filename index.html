<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>건설라이브러리 포스트 검증기</title>
<meta name="description" content="건설라이브러리 ARCHIVE 포스트 검증 및 현황 관리">
<meta name="theme-color" content="#1B2F5E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="검증기">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxOTIgMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgcng9IjMyIiBmaWxsPSIjMUIyRjVFIi8+PHRleHQgeD0iOTYiIHk9IjEyOCIgZm9udC1zaXplPSIxMDAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiNFODYxMkMiPvCfkYs8L3RleHQ+PC9zdmc+">
<style>
:root {
  --navy:#1B2F5E; --orange:#E8612C; --orange-light:#FDF0EB;
  --navy-light:#E8ECF5; --green:#2E9E6B; --green-light:#E8F6EF;
  --red:#C0392B; --red-light:#FDECEB; --yellow:#E67E22; --yellow-light:#FEF5EC;
  --gray:#95A5A6; --gray-light:#F5F6FA; --border:#E0E4ED;
  --text:#2C3E50; --text-sub:#7F8C8D;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:#F0F2F7;color:var(--text);min-height:100vh;}

/* HEADER */
.header{background:var(--navy);color:white;padding:0 20px;height:52px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(27,47,94,0.3);}
.header-logo{font-size:14px;font-weight:700;}
.header-logo span{color:var(--orange);}
.header-sep{width:1px;height:20px;background:rgba(255,255,255,0.2);}
.header-sub{font-size:13px;opacity:0.7;}
.header-spacer{flex:1;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-count{font-size:11px;opacity:0.6;}
.sync-indicator{font-size:10px;padding:3px 8px;border-radius:10px;background:rgba(255,255,255,0.15);}
.sync-indicator.ok{background:rgba(46,158,107,0.4);}
.sync-indicator.err{background:rgba(192,57,43,0.4);}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 52px);}

/* SIDEBAR */
.sidebar{width:290px;min-width:290px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-section{padding:14px 16px;border-bottom:1px solid var(--border);}
.section-label{font-size:10px;font-weight:600;color:var(--text-sub);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}

.ifield{flex:1;padding:7px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);color:var(--text);outline:none;transition:border-color 0.15s;}
.ifield:focus{border-color:var(--navy);}
.ifield::placeholder{color:var(--text-sub);}
.input-row{display:flex;gap:6px;margin-bottom:6px;}

.btn{padding:7px 12px;border-radius:6px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;border:none;transition:opacity 0.15s,transform 0.1s;white-space:nowrap;}
.btn:active{transform:scale(0.96);}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-navy{background:var(--navy);color:white;}
.btn-navy:hover:not(:disabled){opacity:0.88;}
.btn-orange{background:var(--orange);color:white;}
.btn-orange:hover:not(:disabled){opacity:0.88;}
.btn-ghost{background:var(--gray-light);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover:not(:disabled){background:var(--border);}
.btn-green{background:var(--green);color:white;}
.btn-green:hover:not(:disabled){opacity:0.88;}
.btn-full{width:100%;}

.filter-tabs{display:flex;gap:4px;flex-wrap:wrap;}
.ftab{padding:4px 9px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:white;color:var(--text-sub);transition:all 0.15s;}
.ftab.active{border-color:transparent;color:white;}
.ftab[data-f="all"].active{background:var(--navy);}
.ftab[data-f="pass"].active{background:var(--green);}
.ftab[data-f="fix"].active{background:var(--yellow);}
.ftab[data-f="delete"].active{background:var(--red);}
.ftab[data-f="unreviewed"].active{background:var(--gray);}

.search-wrap{position:relative;}
.search-input{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);color:var(--text);outline:none;}
.search-input:focus{border-color:var(--navy);}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;}

.post-list{flex:1;overflow-y:auto;padding:6px;}
.post-list::-webkit-scrollbar{width:3px;}
.post-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.pitem{padding:9px 11px;border-radius:7px;cursor:pointer;border:1px solid transparent;margin-bottom:3px;transition:all 0.15s;}
.pitem:hover{background:var(--gray-light);border-color:var(--border);}
.pitem.active{background:var(--navy-light);border-color:var(--navy);}
.pitem-title{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:4px;}
.pitem-meta{font-size:10px;color:var(--text-sub);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}

.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot.pass{background:var(--green);}
.sdot.fix{background:var(--yellow);}
.sdot.delete{background:var(--red);}
.sdot.unreviewed{background:var(--gray);}

.empty-state{text-align:center;padding:36px 16px;color:var(--text-sub);font-size:12px;line-height:1.9;}

.stats-bar{display:flex;gap:10px;padding:10px 14px;border-top:1px solid var(--border);background:var(--gray-light);flex-wrap:wrap;align-items:center;}
.stat-item{display:flex;align-items:center;gap:5px;font-size:11px;}
.stat-num{font-weight:700;font-variant-numeric:tabular-nums;}
.stat-num.pass{color:var(--green);}
.stat-num.fix{color:var(--yellow);}
.stat-num.delete{color:var(--red);}
.stat-num.unreviewed{color:var(--gray);}

.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--orange));border-radius:2px;transition:width 0.4s;}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:20px;}
.main::-webkit-scrollbar{width:4px;}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.placeholder{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-sub);gap:10px;}
.placeholder-icon{font-size:36px;opacity:0.25;}
.placeholder-text{font-size:13px;}

/* CARDS */
.detail-wrap{max-width:100%;display:flex;flex-direction:column;gap:14px;}
.card{background:white;border-radius:10px;border:1px solid var(--border);overflow:hidden;}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.card-header-title{font-size:12px;font-weight:600;color:var(--text);flex:1;}
.card-body{padding:16px 20px;}

/* 상단 2열 레이아웃 (기본정보 + 상태) */
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.top-row .card-body{padding:12px 16px;}
.top-row .detail-title{font-size:14px;margin-bottom:6px;}
.top-row .detail-meta{font-size:10px;gap:10px;}

/* HTML 슬롯 2열 그리드 */
.html-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.html-grid-full{grid-column:1/-1;}
.html-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:11px;font-family:monospace;color:var(--text);resize:none;height:calc((100vh - 320px) / 2);outline:none;transition:border-color 0.15s;line-height:1.5;background:var(--gray-light);}
.html-textarea:focus{border-color:var(--navy);background:white;}
.html-textarea.final{background:var(--navy-light);border-color:var(--navy);height:calc((100vh - 320px) / 2);}

.detail-category{font-size:10px;font-weight:600;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.detail-title{font-size:16px;font-weight:700;line-height:1.4;color:var(--navy);margin-bottom:8px;}
.detail-meta{font-size:11px;color:var(--text-sub);display:flex;gap:14px;flex-wrap:wrap;}
.detail-meta a{color:var(--navy);text-decoration:none;font-weight:500;}
.detail-meta a:hover{text-decoration:underline;}

/* STATUS */
.status-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.status-label{font-size:12px;font-weight:600;color:var(--text);margin-right:4px;}
.sbtn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--font);cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
.sbtn.pass{background:var(--green-light);color:var(--green);border-color:var(--green-light);}
.sbtn.fix{background:var(--yellow-light);color:var(--yellow);border-color:var(--yellow-light);}
.sbtn.delete{background:var(--red-light);color:var(--red);border-color:var(--red-light);}
.sbtn.unreviewed{background:var(--gray-light);color:var(--gray);border-color:var(--border);}
.sbtn.pass.sel{border-color:var(--green);box-shadow:0 0 0 2px rgba(46,158,107,0.15);}
.sbtn.fix.sel{border-color:var(--yellow);box-shadow:0 0 0 2px rgba(230,126,34,0.15);}
.sbtn.delete.sel{border-color:var(--red);box-shadow:0 0 0 2px rgba(192,57,43,0.15);}
.sbtn.unreviewed.sel{border-color:var(--gray);}

/* HTML 입력창 */
.html-slot{margin-bottom:12px;}
.html-slot-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.html-slot-label{font-size:11px;font-weight:700;color:var(--text);flex:1;}
.html-slot-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.badge-orig{background:#E8ECF5;color:var(--navy);}
.badge-gpt{background:#FEF5EC;color:var(--yellow);}
.badge-claude{background:#E8ECF5;color:#5B4FCF;}
.badge-final{background:var(--green-light);color:var(--green);}
.html-slot-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.html-char-count{font-size:10px;color:var(--text-sub);}
.html-slot-btns{display:flex;gap:6px;}

/* 스피너 */
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-state{text-align:center;padding:36px;color:var(--text-sub);font-size:12px;}
.loading-state .spinner{margin:0 auto 12px;}

/* 메모 */
.memo-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:var(--font);color:var(--text);resize:vertical;min-height:80px;outline:none;transition:border-color 0.15s;line-height:1.6;}
.memo-textarea:focus{border-color:var(--navy);}
.memo-sync-status{font-size:10px;color:var(--text-sub);}

/* 미리보기 모달 */
.preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.preview-overlay.show{opacity:1;pointer-events:all;}
.preview-modal{background:white;border-radius:12px;width:90vw;max-width:860px;height:85vh;display:flex;flex-direction:column;transform:scale(0.95);transition:transform 0.2s;overflow:hidden;}
.preview-overlay.show .preview-modal{transform:scale(1);}
.preview-modal-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.preview-modal-title{font-size:13px;font-weight:600;color:var(--navy);flex:1;}
.preview-frame{flex:1;border:none;width:100%;background:white;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:white;border-radius:12px;padding:22px;width:460px;max-width:90vw;transform:scale(0.95);transition:transform 0.2s;}
.modal-overlay.show .modal{transform:scale(1);}
.modal-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;}
.export-ta{width:100%;height:180px;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:11px;font-family:monospace;color:var(--text);resize:none;outline:none;background:var(--gray-light);margin-bottom:4px;}

/* 토스트 */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:white;padding:9px 14px;border-radius:8px;font-size:12px;font-weight:500;z-index:999;opacity:0;transform:translateY(6px);transition:all 0.22s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}

/* 모바일 */
@media(max-width:640px){
  .layout{flex-direction:column;height:auto;min-height:calc(100vh - 52px);}
  .sidebar{width:100%;min-width:unset;border-right:none;border-bottom:2px solid var(--border);}
  .sidebar-section{padding:10px 14px;}
  .filter-tabs{flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;}
  .filter-tabs::-webkit-scrollbar{display:none;}
  .ftab{flex-shrink:0;}
  .post-list{max-height:35vh;}
  .main{padding:12px;}
  .detail-wrap{max-width:100%;gap:10px;}
  .top-row{grid-template-columns:1fr;}
  .html-grid{grid-template-columns:1fr;}
  .card-body{padding:12px 14px;}
  .card-header{padding:10px 14px;}
  .status-row{gap:6px;}
  .sbtn{padding:5px 9px;font-size:11px;}
  .header{padding:0 14px;}
  .header-logo{font-size:13px;}
  .header-sub{font-size:11px;}
  .sync-indicator{font-size:9px;padding:2px 6px;}
  .header-count{display:none;}
  .modal{width:95vw;padding:16px;}
  body{padding-bottom:env(safe-area-inset-bottom);}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">건설라이브러리 <span>ARCHIVE</span></div>
  <div class="header-sep"></div>
  <div class="header-sub">포스트 검증기</div>
  <div class="header-spacer"></div>
  <div class="header-right">
    <div class="sync-indicator" id="syncIndicator">DB 연결 중...</div>
    <div class="header-count" id="headerCount">포스트 0개</div>
  </div>
</div>

<div class="layout">
  <div class="sidebar">

    <!-- WordPress -->
    <div class="sidebar-section">
      <div class="section-label">WordPress</div>
      <div class="input-row">
        <input class="ifield" id="perPage" type="number" value="100" min="1" max="300" style="max-width:70px;">
        <span style="font-size:11px;color:var(--text-sub);align-self:center;">개</span>
        <button class="btn btn-navy" style="flex:1;" onclick="loadPosts()">🔄 새로고침</button>
      </div>
      <div id="loadStatus" style="font-size:10px;color:var(--text-sub);margin-top:4px;"></div>
      <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>
    </div>

    <!-- Gemini API -->
    <div class="sidebar-section" style="background:#E8F6EF;">
      <div class="section-label" style="color:var(--green);">Gemini API</div>
      <div style="display:flex;gap:6px;">
        <input class="ifield" id="geminiKey" type="password" placeholder="AIza...">
        <button class="btn btn-green" onclick="saveGeminiKey()">저장</button>
      </div>
      <div style="margin-top:5px;font-size:10px;" id="geminiKeyStatus">키 미입력</div>
    </div>

    <!-- 필터 -->
    <div class="sidebar-section">
      <div class="section-label">필터</div>
      <div class="filter-tabs">
        <div class="ftab active" data-f="all" onclick="setFilter('all')">전체 <span id="cnt-all">0</span></div>
        <div class="ftab" data-f="unreviewed" onclick="setFilter('unreviewed')">미검토 <span id="cnt-unreviewed">0</span></div>
        <div class="ftab" data-f="pass" onclick="setFilter('pass')">통과 <span id="cnt-pass">0</span></div>
        <div class="ftab" data-f="fix" onclick="setFilter('fix')">수정 <span id="cnt-fix">0</span></div>
        <div class="ftab" data-f="delete" onclick="setFilter('delete')">삭제 <span id="cnt-delete">0</span></div>
      </div>
    </div>

    <!-- 검색 -->
    <div class="sidebar-section" style="padding-bottom:10px;">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="제목 검색..." oninput="renderList()">
      </div>
    </div>

    <div class="post-list" id="postList">
      <div class="empty-state">WordPress URL을 입력하고<br>불러오기를 누르세요</div>
    </div>

    <div class="stats-bar">
      <div class="stat-item"><span class="sdot pass"></span><span class="stat-num pass" id="s-pass">0</span></div>
      <div class="stat-item"><span class="sdot fix"></span><span class="stat-num fix" id="s-fix">0</span></div>
      <div class="stat-item"><span class="sdot delete"></span><span class="stat-num delete" id="s-delete">0</span></div>
      <div class="stat-item"><span class="sdot unreviewed"></span><span class="stat-num unreviewed" id="s-unreviewed">0</span></div>
      <div style="margin-left:auto;">
        <button class="btn btn-ghost" onclick="showExport()" style="font-size:10px;padding:4px 9px;">내보내기</button>
      </div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="placeholder">
      <div class="placeholder-icon">📋</div>
      <div class="placeholder-text">포스트를 선택하세요</div>
    </div>
  </div>
</div>

<!-- 미리보기 모달 -->
<div class="preview-overlay" id="previewModal">
  <div class="preview-modal">
    <div class="preview-modal-header">
      <div class="preview-modal-title" id="previewTitle">HTML 미리보기</div>
      <button class="btn btn-ghost" onclick="closePreview()" style="font-size:11px;padding:5px 10px;">✕ 닫기</button>
    </div>
    <iframe class="preview-frame" id="previewFrame"></iframe>
  </div>
</div>

<!-- 내보내기 모달 -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <div class="modal-title">📊 검증 결과 내보내기</div>
    <textarea class="export-ta" id="exportText" readonly></textarea>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeExport()">닫기</button>
      <button class="btn btn-navy" onclick="copyExport()">복사</button>
      <button class="btn btn-orange" onclick="downloadExport()">CSV 다운로드</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase ──────────────────────────────────────────
const SB_URL = 'https://nmkkzwhcuznpyjnxhrem.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ta2t6d2hjdXpucHlqbnhocmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNTk3NjMsImV4cCI6MjA5ODczNTc2M30.pIO67pp2NG5OGHwAxatISrXtVCFL8nLBWVjWWx3LeKY';
const TABLE = 'post_verifications';
const WP_URL = 'https://buildlibrary.co.kr';

const sbH = {
  'Content-Type':'application/json',
  'apikey':SB_KEY,
  'Authorization':'Bearer '+SB_KEY,
  'Prefer':'return=representation'
};

async function sbFetch(path, opts={}) {
  const res = await fetch(SB_URL+'/rest/v1/'+path, {...opts, headers:{...sbH,...(opts.headers||{})}});
  if (!res.ok) throw new Error(await res.text());
  return res.json().catch(()=>null);
}

// ① 목록용 — id·status·memo·HTML 진행도만 (가벼움)
async function loadDbMeta() {
  try {
    const data = await sbFetch(TABLE+'?select=id,status,memo,html_orig,html_gemini,html_gpt,html_final');
    dbData = {};
    (data||[]).forEach(r=>{
      dbData[r.id] = {
        status: r.status,
        memo: r.memo,
        // HTML은 있는지 여부만 체크 (진행도 표시용)
        has_orig: !!r.html_orig,
        has_gemini: !!r.html_gemini,

let posts=[], currentId=null, currentFilter='all', dbData={};
let wpTotal = 0;

// ── WordPress 로드 (자동/수동 공용) ──────────────────
async function loadWpPosts() {
  const url = WP_URL;
  const perPage = parseInt(document.getElementById('perPage').value) || 100;

  document.getElementById('loadStatus').textContent = '연결 중...';
  document.getElementById('progressBar').style.width = '0%';

  try {
    const headRes = await fetch(`${url}/wp-json/wp/v2/posts?per_page=1`);
    if (!headRes.ok) throw new Error(`HTTP ${headRes.status}`);
    wpTotal = parseInt(headRes.headers.get('X-WP-Total') || '0');

    let fetched = [];
    const pages = Math.ceil(Math.min(wpTotal, perPage) / 100);
    for (let page = 1; page <= pages; page++) {
      const limit = Math.min(100, perPage - fetched.length);
      const res = await fetch(`${url}/wp-json/wp/v2/posts?per_page=${limit}&page=${page}&_fields=id,title,link,date,categories,excerpt,content`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const batch = await res.json();
      fetched = fetched.concat(batch);
      document.getElementById('progressBar').style.width = Math.round(fetched.length / Math.min(wpTotal, perPage) * 100) + '%';
      if (batch.length < limit) break;
    }

    let catMap = {};
    try {
      const cr = await fetch(`${url}/wp-json/wp/v2/categories?per_page=100`);
      (await cr.json()).forEach(c => { catMap[c.id] = c.name; });
    } catch {}

    posts = fetched.map(p => {
      const db = dbData[p.id] || {};
      return {
        id: p.id,
        title: p.title?.rendered ? stripHtml(p.title.rendered) : '(제목 없음)',
        link: p.link,
        date: (p.date || '').slice(0, 10),
        category: (p.categories || []).map(cid => catMap[cid] || `#${cid}`).join(', '),
        excerpt: p.excerpt?.rendered ? stripHtml(p.excerpt.rendered).slice(0, 120) : '',
        wpContent: p.content?.rendered || '', // WordPress 원본 (임시 보관)
        status: db.status || 'unreviewed',
        memo: db.memo || '',
        // HTML은 진행도만 로컬 보관, 실제 내용은 클릭 시 로드
        has_orig: db.has_orig || false,
        has_gemini: db.has_gemini || false,
        has_gpt: db.has_gpt || false,
        has_final: db.has_final || false,
        // HTML 캐시 (한 번 로드 후 재사용)
        html_orig: null, html_gemini: null, html_gpt: null, html_final: null
      };
    });

    document.getElementById('loadStatus').textContent = `✓ ${posts.length}개 (전체 ${wpTotal}개)`;
    document.getElementById('headerCount').textContent = `포스트 ${posts.length}개`;
    renderList(); updateStats();
    showToast(`${posts.length}개 로드됨`, 'success');
  } catch(e) {
    document.getElementById('loadStatus').textContent = '⚠ ' + e.message;
    document.getElementById('postList').innerHTML = `<div class="empty-state">연결 실패<br><small>${e.message}</small></div>`;
    showToast('연결 실패', 'error');
  }
}

function setFilter(f) {
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.toggle('active',t.dataset.f===f));
  renderList();
}

function renderList() {
  const q=document.getElementById('searchInput').value.toLowerCase();
  const filtered=posts.filter(p=>{
    if (currentFilter!=='all'&&p.status!==currentFilter) return false;
    if (q&&!p.title.toLowerCase().includes(q)&&!p.category.toLowerCase().includes(q)) return false;
    return true;
  });

  if (filtered.length===0) {
    document.getElementById('postList').innerHTML='<div class="empty-state">해당하는 포스트가 없습니다</div>';
    return;
  }

  const htmlProgress = p => {
    let filled = (p.has_orig?1:0)+(p.has_gemini?1:0)+(p.has_gpt?1:0)+(p.has_final?1:0);
    return filled > 0 ? `<span style="color:var(--navy);font-size:9px;">HTML ${filled}/4</span>` : '';
  };

  document.getElementById('postList').innerHTML=filtered.map(p=>`
    <div class="pitem ${currentId===p.id?'active':''}" onclick="selectPost(${p.id})">
      <div class="pitem-title">${esc(p.title)}</div>
      <div class="pitem-meta">
        <span class="sdot ${p.status}"></span>
        <span>${sLabel(p.status)}</span>
        ${p.category?`<span>· ${esc(p.category)}</span>`:''}
        <span>· ${p.date}</span>
        ${htmlProgress(p)}
      </div>
    </div>
  `).join('');
  updateStats();
}

function updateStats() {
  const cnt={all:0,pass:0,fix:0,delete:0,unreviewed:0};
  posts.forEach(p=>{cnt.all++;cnt[p.status]=(cnt[p.status]||0)+1;});
  ['all','pass','fix','delete','unreviewed'].forEach(k=>{
    const el=document.getElementById('cnt-'+k); if(el) el.textContent=cnt[k];
    const se=document.getElementById('s-'+k); if(se) se.textContent=cnt[k];
  });
  const reviewed=cnt.pass+cnt.fix+cnt.delete;
  document.getElementById('progressBar').style.width=cnt.all>0?(reviewed/cnt.all*100)+'%':'0%';
}

4. 참고기준 섹션은 실제 본문에서 사용한 기준만 포함하며, 기준 근거가 부족한 경우 참고기준을 새로 지어내지 않음
5. 문장은 블로그 독자가 이해하기 쉽게 간결하게 정리
6. HTML 구조는 유지하되, 중복 문단과 과도한 표는 정리 (단, 실무 서식 샘플이나 양식 예시는 내용 수치만 교정할 뿐 레이아웃 구조 자체를 임의로 삭제하지 말 것)

## 추가 안전 규칙 (Strict Safety Rules)
- 기준 근거 및 검토 메모가 비어 있거나 부족한 경우, 법령·기준 수치·시험빈도·허용오차·하자담보 기간을 새로 확정하지 않는다.
- 근거가 없는 기존 수치는 삭제하거나 조건부 표현으로 완화한다.
- 원본, 검토본, 기준 근거 어디에도 없는 새로운 사례, 수치, 법령명, 기준명, 공법명, 제품명을 임의로 추가하지 않는다.
- 표 안의 수치와 본문 수치가 충돌하면 기준 근거에 있는 값으로 통일한다.
- 근거가 불명확한 표의 수치는 "실무 참고", "예시", "제품별 상이"로 표시하거나 삭제한다.

## 수치·기준 처리 규칙
- 기준 근거에 명확히 있는 수치 → 확정 기준으로 작성
- 제조사 시방서에만 있는 수치 → "제조사 시방서에서 요구하는 경우가 많다" 또는 "제품별 기준 확인"으로 작성
- 실무 관행 수치 → "실무 참고 범위"로 작성
- 출처가 불명확한 수치 → 삭제하거나 조건부 표현으로 완화
- 두 검토본의 수치가 충돌하면 기준 근거에 있는 수치만 채택
- 기준 근거가 없으면 더 보수적으로 작성하고, 특정 수치를 단정하지 않음

## 두 검토본 비교 규칙
- 두 버전에서 동일하게 수정된 부분이라도 기준 근거와 맞는지 확인 후 채택
- 한 버전에서만 수정된 부분은 기준 근거가 있거나 명백히 표현을 안전하게 만든 경우에만 채택
- 원본이 더 정확하면 원본 표현을 유지
- ChatGPT/Claude 수정본 모두 부정확하면 새로 안전한 문장으로 재작성
- 불확실한 내용은 확정 표현 대신 원인, 조건, 기준 확인 방식 중심으로 작성

## HTML 출력 규칙
- 최종 결과는 설명이나 마크다운 코드블록 펜스(\`\`\`html 또는 \`\`\`)를 전면 배제하고 오직 순수 HTML 코드만 출력
- 출력되는 문서의 첫 라인은 무조건 HTML 태그(예: <h2> 또는 <p>)로 시작되어야 함
- <h1>은 사용하지 말고 <h2>, <h3>, <p>, <ul>, <li>, <table> 중심으로 작성
- 불필요한 id, class, style 속성은 제거
- 외부 링크는 사용하지 않음
- 참고기준 섹션은 문서 하단에 유지하되 실제 본문에서 사용하고 검증된 기준만 포함 (지어내기 금지)
- 최종 HTML 안에 "ChatGPT", "Claude", "Gemini", "검토본"이라는 표현을 넣지 않음

      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },

        })
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    let html = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    html = html.replace(/^```html?\n?/,'').replace(/\n?```$/,'').trim();

    p.html_final = html;
    p.has_final = !!html;

        <button class="btn btn-green" style="font-size:11px;" onclick="generateFinal()">🔄 재생성</button>
      </div>

    document.getElementById('gemini-generate-area').innerHTML = `

      <button class="btn btn-green btn-full" onclick="generateFinal()">🔄 다시 시도</button>
    `;
    showToast('생성 실패: '+e.message,'error');
  }

// ── HTML 전체 저장 ────────────────────────────────────
async function saveAllHtml() {
  const p = posts.find(x=>x.id===currentId);
  if (!p) return;
  p.html_orig = document.getElementById('html-orig')?.value ?? p.html_orig;
  p.html_gemini = document.getElementById('html-gemini')?.value ?? p.html_gemini;
  p.html_gpt = document.getElementById('html-gpt')?.value ?? p.html_gpt;
  p.html_final = document.getElementById('html-final')?.value ?? p.html_final;
  p.has_orig = !!p.html_orig; p.has_gemini = !!p.html_gemini;
  p.has_gpt = !!p.html_gpt; p.has_final = !!p.html_final;
  const ok = await saveHtml(p);
  renderList();
  showToast(ok ? '☁ HTML 저장됨' : '⚠ 저장 실패', ok?'success':'error');
}

// ── 상태 변경 ─────────────────────────────────────────
async function setStatus(status) {
  const p = posts.find(x=>x.id===currentId);
  if (!p) return;
  p.status = status;
  if (dbData[p.id]) dbData[p.id].status = status;
  selectPost(currentId); updateStats();
  const ok = await saveStatusMemo(p);
  showToast(`${sLabel(status)}로 변경 — ${ok?'☁ 저장됨':'⚠ 저장 실패'}`, ok?'success':'error');
}

async function saveMemo() {
  const p = posts.find(x=>x.id===currentId);
  if (!p) return;
  p.memo = document.getElementById('memoField').value;
  if (dbData[p.id]) dbData[p.id].memo = p.memo;
  const statusEl = document.getElementById('memoSyncStatus');
  if (statusEl) statusEl.textContent = '저장 중...';
  const ok = await saveStatusMemo(p);
  if (statusEl) statusEl.textContent = ok ? '☁ 저장됨' : '⚠ 저장 실패';
  showToast(ok ? '메모 저장됨' : '저장 실패', ok?'success':'error');
}

// ── 내보내기 ──────────────────────────────────────────
function showExport() {
  const lines=['ID,제목,카테고리,날짜,상태,원본,Gemini,ChatGPT,최종,메모,링크'];
  posts.forEach(p=>{
    lines.push([p.id,`"${p.title.replace(/"/g,'""')}"`,`"${p.category.replace(/"/g,'""')}"`,
      p.date, sLabel(p.status),
      p.html_orig?'O':'', p.html_gemini?'O':'', p.html_gpt?'O':'', p.html_final?'O':'',
      `"${(p.memo||'').replace(/"/g,'""').replace(/\n/g,' ')}"`, p.link].join(','));
  });
  document.getElementById('exportText').value=lines.join('\n');
  document.getElementById('exportModal').classList.add('show');
}
function closeExport(){document.getElementById('exportModal').classList.remove('show');}
function copyExport(){document.getElementById('exportText').select();document.execCommand('copy');showToast('복사됨','success');}
function downloadExport(){
  const blob=new Blob(['\uFEFF'+document.getElementById('exportText').value],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`buildlibrary_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  closeExport();
}

// ── 유틸 ──────────────────────────────────────────────
function stripHtml(html){const d=document.createElement('div');d.innerHTML=html;return d.textContent||d.innerText||'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sLabel(s){return {pass:'통과',fix:'수정필요',delete:'삭제',unreviewed:'미검토'}[s]||s;}
function copyText(text) {
  const decoded = text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
  navigator.clipboard.writeText(decoded).then(()=>showToast('복사됨','success')).catch(()=>showToast('복사 실패','error'));
}
function showToast(msg,type=''){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t);t._t=setTimeout(()=>{t.className='toast';},2800);
}

document.getElementById('exportModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeExport();});
